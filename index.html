<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14110d">
<meta name="description" content="CampusRide — share rides with verified BMSCE students.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<title>CampusRide – Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script>
  (function () {
    try {
      var t = localStorage.getItem('cr-theme');
      var light = t === 'light' || (!t && matchMedia('(prefers-color-scheme: light)').matches);
      if (light) document.documentElement.setAttribute('data-theme', 'light');
    } catch (_) {}
  })();
</script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="auth.js"></script>
<script src="ui.js"></script>
<script src="rides.js"></script>
<script src="places.js" defer></script>
</head>
<body>

<main class="page">

  <!-- Hero -->
  <header class="hero hero--panel reveal" style="--i:0">
    <p class="hero__eyebrow" id="heroGreeting">Good day</p>
    <h1 id="heroTitle">Where to?</h1>
    <p>Find a seat or fill your own — in seconds.</p>
  </header>

  <!-- Quick actions -->
  <section class="section reveal" style="--i:1" aria-label="Quick actions">
    <div class="tiles">
      <a href="rides.html" class="tile">
        <div class="tile__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <h3>Find a ride</h3>
        <p>Browse live rides from students near you</p>
      </a>
      <button type="button" class="tile tile--primary" onclick="openOffer()">
        <div class="tile__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </div>
        <h3>Offer a ride</h3>
        <p>Going somewhere? Fill your empty seats</p>
      </button>
    </div>
  </section>

  <!-- Upcoming bookings -->
  <section class="section reveal" style="--i:2" aria-label="Upcoming bookings">
    <div class="section-hd">
      <h2>Upcoming rides</h2>
      <span class="section-tag" id="bookingsTag">…</span>
    </div>
    <div class="list" id="bookingsList"></div>
  </section>

</main>

<!-- Offer ride sheet -->
<div class="overlay" id="offerOverlay" role="dialog" aria-modal="true" aria-labelledby="offerTitle" aria-hidden="true">
  <div class="sheet">
    <div class="sheet__handle"></div>
    <h2 class="sheet__title" id="offerTitle">Offer a ride</h2>
    <form class="sheet__form" onsubmit="postRide(event)" novalidate>
      <div class="field">
        <label class="field__label" for="offFrom">From</label>
        <div class="field__wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
          <input id="offFrom" type="text" class="input" placeholder="Pickup — e.g. BMSCE Gate 2" required data-autofocus>
        </div>
      </div>
      <div class="field">
        <label class="field__label" for="offTo">To</label>
        <div class="field__wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></svg>
          <input id="offTo" type="text" class="input" placeholder="Drop — e.g. Majestic" required>
        </div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label class="field__label" for="offWhen">Date &amp; time</label>
          <div class="field__wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
            <input id="offWhen" type="datetime-local" class="input" required>
          </div>
        </div>
        <div class="field">
          <label class="field__label" for="offSeats">Seats</label>
          <div class="field__wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <input id="offSeats" type="number" class="input" min="1" max="6" value="3" required>
          </div>
        </div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label class="field__label" for="offVehicle">Vehicle</label>
          <div class="field__wrap">
            <span id="offVehIcon" style="position:absolute; left:0.9rem; display:flex; color:var(--text-3); pointer-events:none; z-index:1;"></span>
            <select id="offVehicle" class="input" onchange="swapVeh()">
              <option value="auto">Auto</option>
              <option value="cab" selected>Cab</option>
              <option value="bike">Bike</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label class="field__label" for="offPrice">Price / seat (₹)</label>
          <div class="field__wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h12"/><path d="M6 8h12"/><path d="m6 13 8.5 8"/><path d="M6 13h3"/><path d="M9 13c6.667 0 6.667-10 0-10"/></svg>
            <input id="offPrice" type="number" class="input" min="1" placeholder="80" required>
          </div>
        </div>
      </div>
      <div class="msg-error" id="offError" role="alert"></div>
      <div class="sheet__actions">
        <button type="button" class="btn btn--ghost" onclick="UI.closeSheet('offerOverlay')">Cancel</button>
        <button type="submit" class="btn btn--primary">Post ride</button>
      </div>
    </form>
  </div>
</div>

<!-- Booked ride detail sheet -->
<div class="overlay" id="detailOverlay" role="dialog" aria-modal="true" aria-labelledby="detailTitle" aria-hidden="true">
  <div class="sheet">
    <div class="sheet__handle"></div>
    <h2 class="sheet__title" id="detailTitle">Your booking</h2>
    <div id="detailBody"></div>
  </div>
</div>

<script>
  UI.mountNav('home');

  var me = null, myPhone = '';

  AUTH.requireAuth(function (user) {
    me = user.email;

    /* ── Hero ── */
    var now = new Date();
    document.getElementById('heroGreeting').textContent =
      UI.greeting() + ' · ' + now.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
    document.getElementById('heroTitle').textContent = 'Where to, ' + AUTH.firstName(me) + '?';
    AUTH.loadMyName(function (nm) {
      document.getElementById('heroTitle').textContent = 'Where to, ' + nm.split(' ')[0] + '?';
    });

    /* ── Mandatory phone gate ── */
    AUTH.getMyPhone(function (p) {
      if (p) { myPhone = p; return; }
      UI.requirePhone(function (phone, done) {
        AUTH.setMyPhone(phone, function (r) {
          if (r.ok) myPhone = phone;
          done(r.ok);
        });
      });
    });

    loadBookings();
  });

  /* ── Upcoming bookings ── */
  var myBookings = [];
  var PINM = '<svg class="pin-mini" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>';

  function loadBookings() {
    UI.skeletons('bookingsList', 2);
    RIDES.getBookedBy(me, function (booked) {
      myBookings = booked
        .filter(function (r) { return r.status !== 'cancelled' && !RIDES.isPast(r.datetime); })
        .sort(function (a, b) { return new Date(a.datetime) - new Date(b.datetime); });
      renderBookings();
    });
  }

  function renderBookings() {
    var list = document.getElementById('bookingsList');
    var tag  = document.getElementById('bookingsTag');
    tag.textContent = myBookings.length + ' upcoming';
    if (myBookings.length === 0) {
      list.innerHTML =
        '<div class="empty">' +
          UI.icon('route', 44) +
          '<h3>No rides booked yet</h3>' +
          '<p>Grab a seat on a ride that matches your route.</p>' +
          '<a href="rides.html" class="btn btn--soft btn--sm">' + UI.icon('search') + ' Find a ride</a>' +
        '</div>';
      return;
    }
    list.innerHTML = myBookings.map(function (r) {
      var chip = UI.timeChip(r.datetime);
      var driver = AUTH.rideName(r);
      return (
        '<article class="ticket" data-id="' + UI.esc(r.id) + '" tabindex="0" role="button" ' +
          'aria-label="Booked ride ' + UI.esc(r.from) + ' to ' + UI.esc(r.to) + '">' +
          '<div class="ticket__main">' +
            '<div class="ticket__head">' +
              '<span class="ticket__label">Booked · ' + RIDES.cap(r.vehicle || 'cab') + '</span>' +
              '<span class="time-chip' + (chip.soon ? ' time-chip--soon' : '') + '">' + RIDES.formatDT(r.datetime) + '</span>' +
            '</div>' +
            '<div class="route">' +
              '<div class="route__rail"><span class="route__dot route__dot--a"></span><span class="route__line"></span><span class="route__dot route__dot--b"></span></div>' +
              '<div class="route__stop"><small>From' + (r.fromLat ? PINM : '') + '</small>' + UI.esc(r.from) + '</div>' +
              '<div class="route__stop"><small>To' + (r.toLat ? PINM : '') + '</small>' + UI.esc(r.to) + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="ticket__divider"></div>' +
          '<div class="ticket__foot">' +
            '<div class="avatar avatar--sm" style="' + UI.avatarStyle(r.offeredBy) + '">' + UI.initials(driver) + '</div>' +
            '<div style="min-width:0; flex:1;">' +
              '<div style="font-size:0.82rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + UI.esc(driver) + '</div>' +
              '<div style="font-size:0.72rem; color:var(--text-3);">₹' + UI.esc(String(r.price || '—')) + '/seat</div>' +
            '</div>' +
            '<div class="ticket__barcode" aria-hidden="true"></div>' +
          '</div>' +
        '</article>'
      );
    }).join('');
    UI.stagger(list);
  }

  /* ticket → detail sheet */
  document.getElementById('bookingsList').addEventListener('click', function (e) {
    var t = e.target.closest('.ticket');
    if (t) openDetail(t.dataset.id);
  });
  document.getElementById('bookingsList').addEventListener('keydown', function (e) {
    var t = e.target.closest('.ticket');
    if (t && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); openDetail(t.dataset.id); }
  });

  function openDetail(id) {
    var r = myBookings.find(function (x) { return x.id === id; });
    if (!r) return;
    var driver = AUTH.rideName(r);
    var canCancel = RIDES.canCancel(r.datetime);
    var waDigits = (r.phone || '').replace(/\D/g, '');

    document.getElementById('detailBody').innerHTML =
      '<div class="detail__head">' +
        '<div class="avatar" style="' + UI.avatarStyle(r.offeredBy) + '">' + UI.initials(driver) + '</div>' +
        '<div style="min-width:0;">' +
          '<div style="font-weight:600; display:flex; align-items:center; gap:0.35rem;">' + UI.esc(driver) +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--violet)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg>' +
          '</div>' +
          '<div style="font-size:0.78rem; color:var(--text-3); overflow:hidden; text-overflow:ellipsis;">' + UI.esc(r.offeredBy) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="route">' +
        '<div class="route__rail"><span class="route__dot route__dot--a"></span><span class="route__line"></span><span class="route__dot route__dot--b"></span></div>' +
        '<div class="route__stop"><small>From' + (r.fromLat ? PINM : '') + '</small>' + UI.esc(r.from) + '</div>' +
        '<div class="route__stop"><small>To' + (r.toLat ? PINM : '') + '</small>' + UI.esc(r.to) + '</div>' +
      '</div>' +
      '<div class="detail-map" id="detailMapH"></div>' +
      '<div class="detail__facts" style="margin-bottom:0.9rem;">' +
        '<div class="fact"><small>When</small><span>' + RIDES.formatDT(r.datetime) + '</span></div>' +
        '<div class="fact"><small>Vehicle</small><span>' + RIDES.cap(r.vehicle || 'cab') + '</span></div>' +
        '<div class="fact"><small>Price / seat</small><span>₹' + UI.esc(String(r.price || '—')) + '</span></div>' +
        '<div class="fact"><small>Status</small><span style="color:var(--green);">Booked ✓</span></div>' +
      '</div>' +
      '<div class="detail__actions" style="margin-top:0;gap:0.9rem;">' +
        (waDigits
          ? '<div style="background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:0.9rem 1rem;display:flex;flex-direction:column;gap:0.75rem;">' +
              '<div style="display:flex;flex-direction:column;gap:0.25rem;">' +
                '<span style="font-size:0.72rem;color:var(--text-3);letter-spacing:0.05em;text-transform:uppercase;">' + UI.esc(AUTH.rideFirstName(r)) + '’s number</span>' +
                '<a href="tel:+' + waDigits + '" style="font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--text-1);text-decoration:none;letter-spacing:0.01em;">' + UI.esc(r.phone) + '</a>' +
              '</div>' +
              '<div style="display:flex;gap:0.5rem;">' +
                '<button type="button" class="btn btn--wa" onclick="contactDriver(\'' + UI.esc(r.id) + '\')" style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:0.4rem;">' + UI.icon('phone') + ' WhatsApp</button>' +
                '<a class="btn btn--soft" href="tel:+' + waDigits + '" style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:0.4rem;text-decoration:none;">' + UI.icon('phone') + ' Call</a>' +
              '</div>' +
            '</div>'
          : '<p class="hint" style="text-align:center;">' + UI.esc(AUTH.rideFirstName(r)) + ' hasn’t added a phone number yet.</p>') +
        '<div class="detail__actions-row">' +
          '<button type="button" class="btn btn--soft" onclick="shareRide(\'' + UI.esc(r.id) + '\')">' + UI.icon('share') + ' Share</button>' +
          (canCancel
            ? '<button type="button" class="btn btn--danger" onclick="cancelBooking(\'' + UI.esc(r.id) + '\')">Cancel booking</button>'
            : '<span class="badge badge--locked" style="align-self:center; margin:0 auto;">Locked &lt;15 min</span>') +
        '</div>' +
      '</div>';

    /* exact pins on a mini map (only when the ride has coordinates) */
    if (window.PLACES) {
      PLACES.routeMap(document.getElementById('detailMapH'),
        { lat: r.fromLat, lng: r.fromLng }, { lat: r.toLat, lng: r.toLng });
    } else {
      document.getElementById('detailMapH').style.display = 'none';
    }

    UI.openSheet('detailOverlay');
  }

  function findBooking(id) { return myBookings.find(function (x) { return x.id === id; }); }

  function contactDriver(id) {
    var r = findBooking(id);
    if (!r || !r.phone) return;
    var msg = 'Hi ' + AUTH.rideFirstName(r) + '! I booked your CampusRide ' +
              r.from + ' → ' + r.to + ' (' + RIDES.formatDT(r.datetime) + ').';
    window.open('https://wa.me/' + r.phone.replace(/\D/g, '') + '?text=' + encodeURIComponent(msg), '_blank', 'noopener');
  }

  function shareRide(id) {
    var r = findBooking(id);
    if (!r) return;
    UI.share({
      title: 'CampusRide',
      text: 'My ride: ' + r.from + ' → ' + r.to + ' · ' + RIDES.formatDT(r.datetime) +
            ' · with ' + AUTH.rideName(r) + ' (₹' + (r.price || '—') + '/seat)'
    }, 'Ride details copied');
  }

  function cancelBooking(id) {
    UI.confirm({
      title: 'Cancel this booking?',
      message: 'Your seat will be released for other students.',
      confirmLabel: 'Cancel booking',
      cancelLabel: 'Keep it',
      danger: true
    }).then(function (yes) {
      if (!yes) return;
      RIDES.cancelBooking(id, me, function (res) {
        if (res.ok) {
          UI.closeSheet('detailOverlay');
          UI.toast('Booking cancelled', 'success');
          loadBookings();
        } else if (res.error === 'too_late') {
          UI.toast('Can’t cancel within 15 minutes of the ride', 'error');
        } else {
          UI.toast('Something went wrong — try again', 'error');
        }
      });
    });
  }

  /* ── Offer a ride ── */
  function localDT(d) {
    var p = function (n) { return String(n).padStart(2, '0'); };
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + 'T' + p(d.getHours()) + ':' + p(d.getMinutes());
  }

  function openOffer() {
    document.getElementById('offWhen').min = localDT(new Date());
    document.getElementById('offError').style.display = 'none';
    UI.openSheet('offerOverlay');
  }

  function swapVeh() {
    document.getElementById('offVehIcon').innerHTML = UI.vehicleIcon(document.getElementById('offVehicle').value);
  }
  swapVeh();

  function postRide(e) {
    e.preventDefault();
    var errEl = document.getElementById('offError');
    errEl.style.display = 'none';

    var from  = document.getElementById('offFrom').value.trim();
    var to    = document.getElementById('offTo').value.trim();
    var when  = document.getElementById('offWhen').value;
    var seats = parseInt(document.getElementById('offSeats').value, 10);
    var veh   = document.getElementById('offVehicle').value;
    var price = parseInt(document.getElementById('offPrice').value, 10);

    function fail(msg) { errEl.textContent = msg; errEl.style.display = 'block'; }
    if (!from || !to)                      return fail('Add both pickup and drop locations.');
    if (!when)                             return fail('Pick a date and time.');
    if (new Date(when) - Date.now() < 0)   return fail('That time is in the past.');
    if (!seats || seats < 1 || seats > 6)  return fail('Seats must be between 1 and 6.');
    if (!price || price < 1)               return fail('Add a price per seat.');

    var fromEl = document.getElementById('offFrom'), toEl = document.getElementById('offTo');
    RIDES.add({
      offeredBy: me, offererName: AUTH.myDisplayName(), from: from, to: to, datetime: when,
      seats: seats, vehicle: veh, price: price,
      phone: myPhone || '',
      fromLat: fromEl.dataset.lat || '', fromLng: fromEl.dataset.lng || '',
      toLat: toEl.dataset.lat || '', toLng: toEl.dataset.lng || ''
    });

    e.target.reset();
    document.getElementById('offSeats').value = '3';
    swapVeh();
    UI.closeSheet('offerOverlay');
    UI.toast('Ride posted — it’s live!', 'success', {
      action: { label: 'View', fn: function () { window.location.href = 'rides.html'; } }
    });
  }

  /* location autocomplete + map picker (places.js is deferred) */
  window.addEventListener('DOMContentLoaded', function () {
    if (window.PLACES) {
      PLACES.attach(document.getElementById('offFrom'), { map: true });
      PLACES.attach(document.getElementById('offTo'), { map: true });
    }
  });
</script>

</body>
</html>
