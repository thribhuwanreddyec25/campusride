<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<title>Campus Ride – Home</title>
<script src="auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="rides.js"></script>
<script>
  (function () {
    try {
      if (localStorage.getItem('cr-theme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    } catch (_) {}
  })();
</script>
<script src="theme.js" defer></script>
</head>
<body>

<!-- Top Nav -->
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand" aria-label="Campus Ride – Home">Campus Ride</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link active" aria-current="page">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span>Home</span>
      </a>
      <a href="rides.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
        <span>Rides</span>
      </a>
      <a href="profile.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </a>
    </div>
    <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle theme" aria-pressed="false" title="Toggle theme">
      <svg class="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
    </button>
  </div>
</nav>

<main class="page-main">

  <!-- Hero -->
  <div class="home-hero">
    <p class="hero-label" id="heroGreeting">Good afternoon</p>
    <h1 class="hero-title" id="heroTitle">Welcome back 👋</h1>
    <p class="hero-sub">Where are you heading today?</p>
  </div>

  <!-- Quick Actions -->
  <div>
    <div class="section-hd">
      <h2>Quick Actions</h2>
    </div>
    <div class="action-grid">
      <a href="rides.html" class="action-card">
        <div class="action-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <h3>Find a Ride</h3>
        <p>Browse available rides near you</p>
      </a>
      <button class="action-card primary" onclick="document.getElementById('offerOverlay').classList.add('open')">
        <div class="action-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </div>
        <h3>Offer a Ride</h3>
        <p>Share your journey with others</p>
      </button>
    </div>
  </div>

  <!-- Upcoming Bookings (dynamic) -->
  <div id="bookings-section">
    <div class="section-hd">
      <h2>Upcoming Bookings</h2>
      <span class="section-tag" id="bookings-tag">0 upcoming</span>
    </div>
    <div class="rides-list" id="bookings-list">
      <p id="no-bookings" style="text-align:center; color:var(--text-3); font-size:0.88rem; padding:1.5rem 0;">
        No bookings yet — <a href="rides.html" style="color:var(--brand);">find a ride</a>.
      </p>
    </div>
  </div>

</main>

<!-- Offer Ride Sheet -->
<div class="offer-overlay" id="offerOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="offer-sheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">Offer a Ride</h2>
    <form class="offer-form" onsubmit="postRideHome(event)">
      <div class="input-group">
        <label class="input-label">From</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
          <input id="hOfferFrom" type="text" class="form-input" placeholder="Pickup location" required>
        </div>
      </div>
      <div class="input-group">
        <label class="input-label">To</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
          <input id="hOfferTo" type="text" class="form-input" placeholder="Drop location" required>
        </div>
      </div>
      <div class="search-row">
        <div class="input-group">
          <label class="input-label">Date &amp; Time</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
            <input id="hOfferDatetime" type="datetime-local" class="form-input" required>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">Seats</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input id="hOfferSeats" type="number" class="form-input" min="1" max="6" placeholder="3" value="3" required>
          </div>
        </div>
      </div>
      <div class="search-row">
        <div class="input-group">
          <label class="input-label">Vehicle</label>
          <div class="input-wrap">
            <span id="home-vehicle-icon" style="display:contents"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg></span>
            <select id="hOfferVehicle" class="form-input" onchange="RIDES.swapVehicleIcon('home-vehicle-icon', this.value)">
              <option value="auto">Auto</option>
              <option value="cab" selected>Cab</option>
              <option value="bike">Bike</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">Price (₹)</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12"/><path d="M6 8h12"/><path d="m6 13 8.5 8"/><path d="M6 13h3"/><path d="M9 13c6.667 0 6.667-10 0-10"/></svg>
            <input id="hOfferPrice" type="number" class="form-input" min="1" placeholder="80" required>
          </div>
        </div>
      </div>
      <div style="display:flex; gap:0.625rem; margin-top:0.25rem;">
        <button type="button" class="btn-ghost" style="flex:1" onclick="document.getElementById('offerOverlay').classList.remove('open')">Cancel</button>
        <button type="submit" class="btn-primary" style="flex:2">Post Ride</button>
      </div>
    </form>
  </div>
</div>

<script>
  // Auth check
  if (!AUTH.requireAuth()) { /* redirected to login */ }
  var user = AUTH.currentUser();

  /* ── Upcoming Bookings ── */
  RIDES.getBookedBy(user, function (booked) {
    var list   = document.getElementById('bookings-list');
    var noEl   = document.getElementById('no-bookings');
    var tagEl  = document.getElementById('bookings-tag');

    tagEl.textContent = booked.length + ' upcoming';
    noEl.style.display = booked.length === 0 ? 'block' : 'none';

    // Remove old dynamic cards (keep the no-bookings p)
    Array.from(list.querySelectorAll('.ride-card')).forEach(function (c) { list.removeChild(c); });

    booked.forEach(function (ride) {
      var driverName = AUTH.displayName(ride.offeredBy);
      var initials   = driverName.split(' ').map(function (w) { return w[0]; }).join('').slice(0, 2).toUpperCase();
      var seatsLeft  = Math.max(0, parseInt(ride.seats) - ride.bookedBy.length);

      var card = document.createElement('div');
      card.className = 'ride-card';
      card.innerHTML =
        '<div class="ride-top">' +
          '<div class="ride-driver">' +
            '<div class="ride-avatar">' + RIDES.esc(initials) + '</div>' +
            '<div>' +
              '<div class="ride-name">' + RIDES.esc(driverName) +
                ' <svg class="verified-badge" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg>' +
              '</div>' +
              '<div class="ride-meta">' + RIDES.cap(ride.vehicle || 'cab') + ' · ' + RIDES.esc(ride.offeredBy) + '</div>' +
            '</div>' +
          '</div>' +
          '<span class="ride-time">' + RIDES.formatDT(ride.datetime) + '</span>' +
        '</div>' +
        '<div class="ride-route">' +
          '<span class="route-from">' + RIDES.esc(ride.from) + '</span>' +
          '<span class="route-arrow">→</span>' +
          '<span class="route-to">'   + RIDES.esc(ride.to)   + '</span>' +
        '</div>' +
        '<div class="ride-footer">' +
          '<span class="ride-price"><span class="currency">₹</span>' + RIDES.esc(String(ride.price || '—')) + '</span>' +
          '<div class="ride-seats"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> ' + seatsLeft + ' seat' + (seatsLeft !== 1 ? 's' : '') + ' left</div>' +
          ((new Date(ride.datetime) - Date.now() > 15 * 60 * 1000)
            ? '<button class="btn-cancel" onclick="cancelUpcomingBooking(\'' + ride.id + '\',this)">Cancel</button>'
            : '<span class="status-badge completed">Booked</span>') +
        '</div>';
      list.appendChild(card);
    });
  });

  function cancelUpcomingBooking(rideId, btn) {
    if (!confirm('Cancel your booking for this ride?')) return;
    btn.textContent = '…'; btn.disabled = true;
    RIDES.cancelBooking(rideId, user, function (r) {
      if (r.ok) {
        btn.closest('.ride-card').remove();
        var remaining = document.querySelectorAll('#bookings-list .ride-card').length;
        document.getElementById('bookings-tag').textContent = remaining + ' upcoming';
        if (remaining === 0) document.getElementById('no-bookings').style.display = 'block';
      } else if (r.error === 'too_late') {
        alert('Can\'t cancel within 15 minutes of the ride.');
        btn.textContent = 'Cancel'; btn.disabled = false;
      } else { btn.textContent = 'Cancel'; btn.disabled = false; }
    });
  }

  function postRideHome(e) {
    e.preventDefault();
    var from    = document.getElementById('hOfferFrom').value.trim();
    var to      = document.getElementById('hOfferTo').value.trim();
    var dt      = document.getElementById('hOfferDatetime').value;
    var seats   = parseInt(document.getElementById('hOfferSeats').value);
    var vehicle = document.getElementById('hOfferVehicle').value;
    var price   = parseInt(document.getElementById('hOfferPrice').value);

    RIDES.add({ offeredBy: user, from: from, to: to, datetime: dt, seats: seats, vehicle: vehicle, price: price });

    // Reset + close
    document.getElementById('hOfferFrom').value = '';
    document.getElementById('hOfferTo').value   = '';
    document.getElementById('hOfferDatetime').value = '';
    document.getElementById('hOfferSeats').value    = '3';
    document.getElementById('hOfferVehicle').value  = 'cab';
    document.getElementById('hOfferPrice').value    = '';
    document.getElementById('offerOverlay').classList.remove('open');

    // Brief confirmation
    var sub = document.getElementById('heroTitle');
    var prev = sub.textContent;
    sub.textContent = 'Ride posted! ✓';
    setTimeout(function() { sub.textContent = prev; }, 2000);
  }

  // Dynamic greeting + name
  (function() {
    var email = AUTH.currentUser();
    if (!email) return;
    var firstName = AUTH.displayName(email).split(' ')[0];
    var h = new Date().getHours();
    var greeting = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('heroGreeting').textContent = greeting;
    document.getElementById('heroTitle').textContent = 'Welcome back, ' + firstName + ' 👋';
  })();
</script>

<!-- Bottom Nav (mobile) -->
<nav class="bottom-nav" aria-label="Main navigation">
  <div class="bottom-nav-inner">
    <a href="index.html" class="bottom-nav-link active" aria-label="Home" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Home</span>
    </a>
    <a href="rides.html" class="bottom-nav-link" aria-label="Rides">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
      <span>Rides</span>
    </a>
    <a href="profile.html" class="bottom-nav-link" aria-label="Profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
    <button type="button" class="bottom-nav-link theme-toggle" data-theme-toggle aria-label="Toggle theme" aria-pressed="false">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      <span>Theme</span>
    </button>
  </div>
</nav>

</body>
</html>
