<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<title>Campus Ride – Create Password</title>
<script src="auth.js"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div class="auth-brand">Campus Ride</div>
      <div class="auth-tagline">One last step</div>
    </div>

    <h2 class="auth-title">Create a password</h2>
    <p class="auth-sub" id="emailDisplay">Setting up your account</p>

    <div class="msg-error" id="msgError"></div>

    <form class="auth-form" onsubmit="handleSubmit(event)" style="margin-top:1rem;">
      <div class="auth-input-group">
        <label class="auth-label" for="pw1">Password</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="pw1" class="form-input" type="password" placeholder="Min. 6 characters" required autocomplete="new-password">
        </div>
      </div>
      <div class="auth-input-group">
        <label class="auth-label" for="pw2">Confirm Password</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="pw2" class="form-input" type="password" placeholder="Repeat password" required autocomplete="new-password">
        </div>
      </div>
      <button type="submit" class="btn-primary">
        Create Account
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </form>

  </div>
</div>

<script>
  var pendingEmail = null;

  (function init() {
    var params = new URLSearchParams(window.location.search);
    pendingEmail = params.get('email');
    if (!pendingEmail) {
      window.location.href = 'login.html';
      return;
    }
    document.getElementById('emailDisplay').textContent =
      'Creating account for ' + pendingEmail;
  })();

  function showError(msg) {
    var el = document.getElementById('msgError');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function handleSubmit(e) {
    e.preventDefault();
    var pw1 = document.getElementById('pw1').value;
    var pw2 = document.getElementById('pw2').value;
    document.getElementById('msgError').style.display = 'none';

    if (pw1.length < 6) {
      showError('Password must be at least 6 characters.');
      return;
    }
    if (pw1 !== pw2) {
      showError('Passwords do not match.');
      return;
    }

    var result = AUTH.addAccount(pendingEmail, pw1);
    if (!result.ok) {
      if (result.error === 'max_accounts') {
        showError('This device has reached the maximum of ' + AUTH.MAX_ACCOUNTS + ' accounts.');
      } else {
        showError('An account for this email already exists. Try logging in.');
      }
      return;
    }

    AUTH.login(pendingEmail);
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
