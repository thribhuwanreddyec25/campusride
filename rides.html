<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14110d">
<meta name="description" content="Browse live rides from verified BMSCE students.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<title>CampusRide – Find a ride</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script>
  (function () {
    try {
      var t = localStorage.getItem('cr-theme');
      var light = t === 'light' || (!t && matchMedia('(prefers-color-scheme: light)').matches);
      if (light) document.documentElement.setAttribute('data-theme', 'light');
    } catch (_) {}
  })();
</script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="auth.js"></script>
<script src="ui.js"></script>
<script src="rides.js"></script>
<script src="places.js" defer></script>
</head>
<body>

<main class="page">

  <header class="page-head reveal" style="--i:0">
    <div>
      <h1>Find a ride</h1>
      <p>Live rides from verified BMSCE students</p>
    </div>
    <button type="button" class="btn btn--primary" onclick="openOffer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
      Offer ride
    </button>
  </header>

  <!-- Search -->
  <section class="search-card reveal" style="--i:1" aria-label="Search rides">
    <div class="card">
      <div class="from-to">
        <div class="field">
          <label class="field__label" for="qFrom">From</label>
          <div class="field__wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
            <input id="qFrom" class="input" type="text" placeholder="BMSCE, Basavanagudi…" autocomplete="off">
          </div>
        </div>
        <button type="button" class="swap-btn" onclick="swapFromTo()" aria-label="Swap from and to" title="Swap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></svg>
        </button>
        <div class="field">
          <label class="field__label" for="qTo">To</label>
          <div class="field__wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></svg>
            <input id="qTo" class="input" type="text" placeholder="Majestic, MG Road…" autocomplete="off">
          </div>
        </div>
      </div>

      <div id="recentRoutes" class="chip-row hidden" aria-label="Recent routes"></div>

      <div class="grid-2">
        <div class="field">
          <label class="field__label" for="sortBy">Sort by</label>
          <div class="field__wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"/><path d="M7 12h10"/><path d="M11 18h4"/></svg>
            <select id="sortBy" class="input" onchange="applyFilters()">
              <option value="soonest" selected>Soonest first</option>
              <option value="cheapest">Cheapest first</option>
              <option value="seats">Most seats</option>
              <option value="newest">Newest posts</option>
            </select>
          </div>
        </div>
        <div class="field">
          <span class="field__label" id="pastLbl">Past rides</span>
          <button type="button" id="pastToggle" class="chip chip--toggle" style="min-height:48px; border-radius:var(--r-md); justify-content:center;"
            onclick="togglePast()" aria-pressed="false" aria-labelledby="pastLbl">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span id="pastToggleLbl">Hidden</span>
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Vehicle chips -->
  <div class="chip-row reveal" style="--i:2; margin-top:0.9rem;" role="group" aria-label="Vehicle filter">
    <button type="button" class="chip active" data-veh="all">All</button>
    <button type="button" class="chip" data-veh="auto"></button>
    <button type="button" class="chip" data-veh="cab"></button>
    <button type="button" class="chip" data-veh="bike"></button>
  </div>

  <!-- Your posted rides -->
  <section class="section hidden" id="mineSection" aria-label="Your posted rides">
    <button type="button" class="section-toggle" id="mineToggle" aria-expanded="false" aria-controls="mineCollapse">
      <h2>Your posted rides</h2>
      <span class="section-tag" id="mineTag">0</span>
      <svg class="section-toggle__chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="collapse" id="mineCollapse">
      <div class="collapse__inner">
        <div class="list" id="mineList" style="padding: 0.125rem 0.125rem 0.375rem;"></div>
      </div>
    </div>
  </section>

  <!-- Available rides -->
  <section class="section" aria-label="Available rides">
    <div class="section-hd">
      <h2>Available rides</h2>
      <span class="section-tag" id="rideTag">…</span>
    </div>
    <div class="list" id="rideList"></div>
  </section>

</main>

<!-- FAB (mobile) -->
<button type="button" class="fab" onclick="openOffer()" aria-label="Offer a ride">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
</button>

<!-- Offer ride sheet -->
<div class="overlay" id="offerOverlay" role="dialog" aria-modal="true" aria-labelledby="offerTitle" aria-hidden="true">
  <div class="sheet">
    <div class="sheet__handle"></div>
    <h2 class="sheet__title" id="offerTitle">Offer a ride</h2>
    <form class="sheet__form" onsubmit="postRide(event)" novalidate>
      <div class="field">
        <label class="field__label" for="offFrom">From</label>
        <div class="field__wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
          <input id="offFrom" type="text" class="input" placeholder="Pickup — e.g. BMSCE Gate 2" required data-autofocus>
        </div>
      </div>
      <div class="field">
        <label class="field__label" for="offTo">To</label>
        <div class="field__wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></svg>
          <input id="offTo" type="text" class="input" placeholder="Drop — e.g. Majestic" required>
        </div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label class="field__label" for="offWhen">Date &amp; time</label>
          <div class="field__wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
            <input id="offWhen" type="datetime-local" class="input" required>
          </div>
        </div>
        <div class="field">
          <label class="field__label" for="offSeats">Seats</label>
          <div class="field__wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <input id="offSeats" type="number" class="input" min="1" max="6" value="3" required>
          </div>
        </div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label class="field__label" for="offVehicle">Vehicle</label>
          <div class="field__wrap">
            <span id="offVehIcon" style="position:absolute; left:0.9rem; display:flex; color:var(--text-3); pointer-events:none; z-index:1;"></span>
            <select id="offVehicle" class="input" onchange="swapVeh()">
              <option value="auto">Auto</option>
              <option value="cab" selected>Cab</option>
              <option value="bike">Bike</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label class="field__label" for="offPrice">Price / seat (₹)</label>
          <div class="field__wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3h12"/><path d="M6 8h12"/><path d="m6 13 8.5 8"/><path d="M6 13h3"/><path d="M9 13c6.667 0 6.667-10 0-10"/></svg>
            <input id="offPrice" type="number" class="input" min="1" placeholder="80" required>
          </div>
        </div>
      </div>
      <div class="msg-error" id="offError" role="alert"></div>
      <div class="sheet__actions">
        <button type="button" class="btn btn--ghost" onclick="UI.closeSheet('offerOverlay')">Cancel</button>
        <button type="submit" class="btn btn--primary">Post ride</button>
      </div>
    </form>
  </div>
</div>

<!-- Ride detail sheet -->
<div class="overlay" id="detailOverlay" role="dialog" aria-modal="true" aria-labelledby="detailTitle" aria-hidden="true">
  <div class="sheet">
    <div class="sheet__handle"></div>
    <h2 class="sheet__title" id="detailTitle">Ride details</h2>
    <div id="detailBody"></div>
  </div>
</div>

<script>
  UI.mountNav('rides');

  var me = null, myPhone = '';

  /* ── State ── */
  var allRides   = [];
  var ratingsMap = {};
  var knownIds   = null;          // null until first snapshot
  var hidePast   = true;
  var vehFilter  = 'all';
  var ROUTES_KEY = 'cr_recent_routes';
  var PINM = '<svg class="pin-mini" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>';

  /* vehicle chips with glyphs */
  (function () {
    document.querySelector('[data-veh="auto"]').innerHTML = UI.vehicleIcon('auto') + ' Auto';
    document.querySelector('[data-veh="cab"]').innerHTML  = UI.vehicleIcon('cab')  + ' Cab';
    document.querySelector('[data-veh="bike"]').innerHTML = UI.vehicleIcon('bike') + ' Bike';
    document.querySelectorAll('[data-veh]').forEach(function (chip) {
      chip.addEventListener('click', function () {
        document.querySelectorAll('[data-veh]').forEach(function (c) { c.classList.remove('active'); });
        chip.classList.add('active');
        vehFilter = chip.dataset.veh;
        applyFilters();
      });
    });
  })();

  UI.skeletons('rideList', 3);

  /* ── Ratings (one-shot; refreshed on each ride change batch) ── */
  function loadRatings(cb) {
    RIDES.getAllRatings(function (map) { ratingsMap = map; if (cb) cb(); });
  }

  /* ── Auth gate → phone gate → realtime rides ── */
  AUTH.requireAuth(function (user) {
    me = user.email;
    AUTH.loadMyName();          // cache my chosen name for posting + own-ride display

    AUTH.getMyPhone(function (p) {
      if (p) { myPhone = p; return; }
      UI.requirePhone(function (phone, done) {
        AUTH.setMyPhone(phone, function (r) {
          if (r.ok) myPhone = phone;
          done(r.ok);
        });
      });
    });

    RIDES.onRidesChange(function (rides) {
    var firstLoad = knownIds === null;
    if (firstLoad) knownIds = {};

    rides.forEach(function (r) {
      if (!firstLoad && !knownIds[r.id] && r.offeredBy !== me &&
          r.status !== 'cancelled' && !RIDES.isPast(r.datetime)) {
        UI.toast('New ride: ' + r.from + ' → ' + r.to, 'info', {
          duration: 5000,
          action: { label: 'View', fn: function () { openDetail(r.id); } }
        });
      }
      knownIds[r.id] = true;
    });

    allRides = rides;
    loadRatings(function () {
      applyFilters();
      renderMine();
    });
    });
  });

  /* ── Filtering ── */
  function norm(s) { return (s || '').toLowerCase().trim(); }

  function applyFilters() {
    var qf = norm(document.getElementById('qFrom').value);
    var qt = norm(document.getElementById('qTo').value);

    var out = allRides.filter(function (r) {
      if (r.offeredBy === me) return false;
      if (r.status === 'cancelled') return false;
      if (hidePast && RIDES.isPast(r.datetime)) return false;
      if (vehFilter !== 'all' && (r.vehicle || 'cab') !== vehFilter) return false;
      if (qf && norm(r.from).indexOf(qf) === -1) return false;
      if (qt && norm(r.to).indexOf(qt) === -1) return false;
      return true;
    });

    var sort = document.getElementById('sortBy').value;
    out.sort(function (a, b) {
      var seatsA = Math.max(0, (+a.seats) - a.bookedBy.length);
      var seatsB = Math.max(0, (+b.seats) - b.bookedBy.length);
      if (sort === 'cheapest') return (a.price || 0) - (b.price || 0);
      if (sort === 'seats')    return seatsB - seatsA;
      if (sort === 'newest')   return (b.postedAt || 0) - (a.postedAt || 0);
      return new Date(a.datetime) - new Date(b.datetime);   // soonest
    });

    renderRides(out, !!(qf || qt) || vehFilter !== 'all');
    maybeSaveRoute(qf, qt);
  }

  function renderRides(rides, filtered) {
    var list = document.getElementById('rideList');
    document.getElementById('rideTag').textContent = rides.length + ' ride' + (rides.length !== 1 ? 's' : '');

    if (rides.length === 0) {
      list.innerHTML = filtered
        ? '<div class="empty">' + UI.icon('search', 44) +
            '<h3>No rides match</h3><p>Try clearing the search or filters.</p>' +
            '<button type="button" class="btn btn--soft btn--sm" onclick="clearFilters()">Clear filters</button></div>'
        : '<div class="empty">' + UI.icon('route', 44) +
            '<h3>No rides posted yet</h3><p>Be the first — offer your ride and split the fare.</p>' +
            '<button type="button" class="btn btn--soft btn--sm" onclick="openOffer()">' + UI.icon('plus') + ' Offer a ride</button></div>';
      return;
    }

    list.innerHTML = rides.map(buildCard).join('');
    UI.stagger(list);
  }

  function buildCard(r) {
    var name      = (r.offeredBy === me) ? AUTH.myDisplayName() : AUTH.rideName(r);
    var seatsLeft = Math.max(0, (+r.seats) - r.bookedBy.length);
    var booked    = r.bookedBy.indexOf(me) !== -1;
    var full      = seatsLeft <= 0;
    var past      = RIDES.isPast(r.datetime);
    var chip      = UI.timeChip(r.datetime);
    var rating    = ratingsMap[r.offeredBy];

    var sub = rating
      ? UI.starsHTML(rating.avg) + ' <span>' + rating.avg.toFixed(1) + ' · ' + RIDES.cap(r.vehicle || 'cab') + '</span>'
      : '<span>New driver · ' + RIDES.cap(r.vehicle || 'cab') + '</span>';

    var action;
    if (past)        action = '<span class="badge badge--locked">Departed</span>';
    else if (booked) action = '<span class="badge badge--booked">' + UI.icon('check', 13) + ' Booked</span>';
    else if (full)   action = '<span class="badge badge--full">Full</span>';
    else             action = '<button type="button" class="btn btn--primary btn--sm js-book" data-id="' + UI.esc(r.id) + '">Book seat</button>';

    return (
      '<article class="ride" data-id="' + UI.esc(r.id) + '" tabindex="0" role="button" ' +
        'aria-label="Ride ' + UI.esc(r.from) + ' to ' + UI.esc(r.to) + ' by ' + UI.esc(name) + '">' +
        '<div class="ride__top">' +
          '<div class="avatar" style="' + UI.avatarStyle(r.offeredBy) + '">' + UI.initials(name) + '</div>' +
          '<div class="ride__who">' +
            '<div class="ride__name">' + UI.esc(name) +
              '<svg class="v-badge" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg>' +
            '</div>' +
            '<div class="ride__sub">' + sub + '</div>' +
          '</div>' +
          '<span class="time-chip' + (chip.soon && !past ? ' time-chip--soon' : '') + '">' + RIDES.formatDT(r.datetime) + '</span>' +
        '</div>' +
        '<div class="route">' +
          '<div class="route__rail"><span class="route__dot route__dot--a"></span><span class="route__line"></span><span class="route__dot route__dot--b"></span></div>' +
          '<div class="route__stop"><small>From' + (r.fromLat ? PINM : '') + '</small>' + UI.esc(r.from) + '</div>' +
          '<div class="route__stop"><small>To' + (r.toLat ? PINM : '') + '</small>' + UI.esc(r.to) + '</div>' +
        '</div>' +
        '<div class="ride__foot">' +
          '<span class="price"><span class="cur">₹</span>' + UI.esc(String(r.price || '—')) + '<small>/seat</small></span>' +
          '<span class="seats-pill' + (seatsLeft === 1 ? ' seats-pill--low' : '') + '">' +
            UI.icon('users', 13) + ' ' + seatsLeft + ' left</span>' +
          '<span class="spacer"></span>' +
          action +
        '</div>' +
      '</article>'
    );
  }

  /* ── Your rides ── */
  function renderMine() {
    var mine = allRides.filter(function (r) { return r.offeredBy === me; });
    var sec  = document.getElementById('mineSection');
    var list = document.getElementById('mineList');
    sec.classList.toggle('hidden', mine.length === 0);
    document.getElementById('mineTag').textContent = mine.length + ' ride' + (mine.length !== 1 ? 's' : '');
    if (!mine.length) { list.innerHTML = ''; return; }

    list.innerHTML = mine.map(function (r) {
      var booked = r.bookedBy.length, total = +r.seats;
      var badge =
        r.status === 'cancelled' ? '<span class="badge badge--cancelled">Cancelled</span>' :
        RIDES.isPast(r.datetime) ? '<span class="badge badge--locked">Completed</span>' :
        r.status === 'full'      ? '<span class="badge badge--full">Full</span>' :
                                   '<span class="badge badge--open">Open</span>';
      return (
        '<article class="ride ride--mine' + (r.status === 'cancelled' ? ' ride--cancelled' : '') + '" data-id="' + UI.esc(r.id) + '" tabindex="0" role="button" aria-label="Your ride ' + UI.esc(r.from) + ' to ' + UI.esc(r.to) + '">' +
          '<div class="ride__top">' +
            '<div class="avatar" style="background:var(--lime); color:var(--ink-on-lime); text-shadow:none;">You</div>' +
            '<div class="ride__who">' +
              '<div class="ride__name">Your ' + UI.esc(r.vehicle || 'cab') + '</div>' +
              '<div class="ride__sub"><span>' + booked + '/' + total + ' seats booked</span></div>' +
            '</div>' +
            '<span class="time-chip">' + RIDES.formatDT(r.datetime) + '</span>' +
          '</div>' +
          '<div class="route">' +
            '<div class="route__rail"><span class="route__dot route__dot--a"></span><span class="route__line"></span><span class="route__dot route__dot--b"></span></div>' +
            '<div class="route__stop"><small>From' + (r.fromLat ? PINM : '') + '</small>' + UI.esc(r.from) + '</div>' +
            '<div class="route__stop"><small>To' + (r.toLat ? PINM : '') + '</small>' + UI.esc(r.to) + '</div>' +
          '</div>' +
          '<div class="ride__foot">' +
            '<span class="price"><span class="cur">₹</span>' + UI.esc(String(r.price || '—')) + '<small>/seat</small></span>' +
            badge +
            '<span class="spacer"></span>' +
            (r.status !== 'cancelled' && RIDES.canCancel(r.datetime)
              ? '<button type="button" class="btn btn--danger btn--sm js-cancel-ride" data-id="' + UI.esc(r.id) + '">Cancel</button>'
              : '') +
          '</div>' +
        '</article>'
      );
    }).join('');
  }

  /* ── Collapsible "Your posted rides" (collapsed by default so
        other students' rides stay front and centre) ── */
  var MINE_OPEN_KEY = 'cr_mine_open';

  function setMineOpen(open) {
    var c = document.getElementById('mineCollapse');
    c.classList.toggle('open', open);
    if (!open) c.classList.remove('done');   // re-clip while closing
    document.getElementById('mineToggle').setAttribute('aria-expanded', String(open));
    try { localStorage.setItem(MINE_OPEN_KEY, open ? '1' : '0'); } catch (_) {}
  }

  document.getElementById('mineToggle').addEventListener('click', function () {
    setMineOpen(!document.getElementById('mineCollapse').classList.contains('open'));
  });

  /* unclip shadows once fully open */
  document.getElementById('mineCollapse').addEventListener('transitionend', function (e) {
    if (e.propertyName === 'grid-template-rows' && e.currentTarget.classList.contains('open')) {
      e.currentTarget.classList.add('done');
    }
  });

  (function restoreMineState() {
    var saved = null;
    try { saved = localStorage.getItem(MINE_OPEN_KEY); } catch (_) {}
    if (saved === '1') {
      document.getElementById('mineCollapse').classList.add('open', 'done');
      document.getElementById('mineToggle').setAttribute('aria-expanded', 'true');
    }
  })();

  /* ── Delegated clicks (book / cancel / open detail) ── */
  document.addEventListener('click', function (e) {
    var bookBtn = e.target.closest('.js-book');
    if (bookBtn) { e.stopPropagation(); bookSeat(bookBtn); return; }

    var cancelBtn = e.target.closest('.js-cancel-ride');
    if (cancelBtn) { e.stopPropagation(); cancelMyRide(cancelBtn.dataset.id); return; }

    var card = e.target.closest('.ride[data-id]');
    if (card && !e.target.closest('button')) openDetail(card.dataset.id);
  });
  document.addEventListener('keydown', function (e) {
    var card = e.target.closest && e.target.closest('.ride[data-id]');
    if (card && (e.key === 'Enter' || e.key === ' ') && e.target === card) {
      e.preventDefault(); openDetail(card.dataset.id);
    }
  });

  function findRide(id) { return allRides.find(function (r) { return r.id === id; }); }

  function bookSeat(btn) {
    var id = btn.dataset.id;
    btn.disabled = true;
    btn.textContent = 'Booking…';
    RIDES.book(id, me, function (res) {
      if (res.ok) {
        UI.toast('Seat booked — see you there!', 'success', {
          action: { label: 'Details', fn: function () { openDetail(id); } }
        });
      } else {
        var msgs = {
          own_ride: "That's your own ride",
          full: 'Just filled up — try another',
          already_booked: 'Already booked ✓',
          not_found: 'Ride no longer exists'
        };
        UI.toast(msgs[res.error] || 'Could not book — try again', res.error === 'already_booked' ? 'info' : 'error');
        btn.disabled = false;
        btn.textContent = 'Book seat';
      }
      /* listener re-render refreshes all cards */
    });
  }

  function cancelMyRide(id) {
    UI.confirm({
      title: 'Cancel this ride?',
      message: 'Students who booked seats will lose them.',
      confirmLabel: 'Cancel ride',
      cancelLabel: 'Keep it',
      danger: true
    }).then(function (yes) {
      if (!yes) return;
      RIDES.cancelRide(id, me, function (res) {
        if (res.ok) UI.toast('Ride cancelled', 'success');
        else if (res.error === 'too_late') UI.toast('Can’t cancel within 15 minutes of departure', 'error');
        else UI.toast('Something went wrong — try again', 'error');
      });
    });
  }

  /* ── Detail sheet ── */
  function openDetail(id) {
    var r = findRide(id);
    if (!r) { UI.toast('Ride no longer exists', 'error'); return; }

    var isMine    = r.offeredBy === me;
    var name      = isMine ? AUTH.myDisplayName() : AUTH.rideName(r);
    var seatsLeft = Math.max(0, (+r.seats) - r.bookedBy.length);
    var booked    = r.bookedBy.indexOf(me) !== -1;
    var past      = RIDES.isPast(r.datetime);
    var rating    = ratingsMap[r.offeredBy];
    var waDigits  = (r.phone || '').replace(/\D/g, '');

    var status =
      r.status === 'cancelled' ? '<span style="color:var(--red);">Cancelled</span>' :
      past                     ? '<span style="color:var(--text-3);">Departed</span>' :
      booked                   ? '<span style="color:var(--green);">Booked ✓</span>' :
      seatsLeft <= 0           ? '<span style="color:var(--amber);">Full</span>' :
                                 '<span style="color:var(--green);">' + seatsLeft + ' seat' + (seatsLeft !== 1 ? 's' : '') + ' open</span>';

    var actions = '';
    if (!isMine && booked && waDigits && !past && r.status !== 'cancelled') {
      actions += '<div style="background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:0.9rem 1rem;display:flex;flex-direction:column;gap:0.75rem;">' +
        '<div style="display:flex;flex-direction:column;gap:0.25rem;">' +
          '<span style="font-size:0.72rem;color:var(--text-3);letter-spacing:0.05em;text-transform:uppercase;">' + UI.esc(AUTH.rideFirstName(r)) + '’s number</span>' +
          '<a href="tel:+' + waDigits + '" style="font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--text-1);text-decoration:none;letter-spacing:0.01em;">' + UI.esc(r.phone) + '</a>' +
        '</div>' +
        '<div style="display:flex;gap:0.5rem;">' +
          '<button type="button" class="btn btn--wa" data-act="wa" style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:0.4rem;">' + UI.icon('phone') + ' WhatsApp</button>' +
          '<a class="btn btn--soft" href="tel:+' + waDigits + '" style="flex:1;display:inline-flex;align-items:center;justify-content:center;gap:0.4rem;text-decoration:none;">' + UI.icon('phone') + ' Call</a>' +
        '</div>' +
      '</div>';
    }
    if (!isMine && booked && !waDigits) {
      actions += '<p class="hint" style="text-align:center;">' + UI.esc(AUTH.rideFirstName(r)) + ' hasn’t added a phone number yet.</p>';
    }
    var row = '<div class="detail__actions-row">';
    row += '<button type="button" class="btn btn--soft" data-act="share">' + UI.icon('share') + ' Share</button>';
    if (!isMine && !booked && !past && seatsLeft > 0 && r.status !== 'cancelled') {
      row += '<button type="button" class="btn btn--primary" data-act="book">Book seat</button>';
    } else if (!isMine && booked && RIDES.canCancel(r.datetime)) {
      row += '<button type="button" class="btn btn--danger" data-act="cancelbooking">Cancel booking</button>';
    } else if (isMine && r.status !== 'cancelled' && RIDES.canCancel(r.datetime)) {
      row += '<button type="button" class="btn btn--danger" data-act="cancelride">Cancel ride</button>';
    }
    row += '</div>';
    actions += row;

    document.getElementById('detailTitle').textContent = isMine ? 'Your ride' : 'Ride details';
    document.getElementById('detailBody').innerHTML =
      '<div class="detail__head">' +
        '<div class="avatar" style="' + (isMine ? 'background:var(--lime); color:var(--ink-on-lime); text-shadow:none;' : UI.avatarStyle(r.offeredBy)) + '">' + (isMine ? 'You' : UI.initials(name)) + '</div>' +
        '<div style="min-width:0;">' +
          '<div style="font-weight:600; display:flex; align-items:center; gap:0.4rem;">' + UI.esc(name) +
            (!isMine ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--violet)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg>' : '') +
          '</div>' +
          '<div style="font-size:0.78rem; color:var(--text-3); display:flex; align-items:center; gap:0.3rem;">' +
            (rating ? UI.starsHTML(rating.avg) + ' ' + rating.avg.toFixed(1) + ' (' + rating.count + ')' : (isMine ? UI.esc(me) : 'New driver')) +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="route">' +
        '<div class="route__rail"><span class="route__dot route__dot--a"></span><span class="route__line"></span><span class="route__dot route__dot--b"></span></div>' +
        '<div class="route__stop"><small>From' + (r.fromLat ? PINM : '') + '</small>' + UI.esc(r.from) + '</div>' +
        '<div class="route__stop"><small>To' + (r.toLat ? PINM : '') + '</small>' + UI.esc(r.to) + '</div>' +
      '</div>' +
      '<div class="detail-map" id="detailMapR"></div>' +
      '<div class="detail__facts">' +
        '<div class="fact"><small>When</small><span>' + RIDES.formatDT(r.datetime) + '</span></div>' +
        '<div class="fact"><small>Vehicle</small><span>' + RIDES.cap(r.vehicle || 'cab') + '</span></div>' +
        '<div class="fact"><small>Price / seat</small><span>₹' + UI.esc(String(r.price || '—')) + '</span></div>' +
        '<div class="fact"><small>Status</small><span>' + status + '</span></div>' +
      '</div>' +
      '<div class="detail__actions">' + actions + '</div>';

    var body = document.getElementById('detailBody');
    body.querySelectorAll('[data-act]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var act = btn.dataset.act;
        if (act === 'wa') {
          var msg = 'Hi ' + AUTH.rideFirstName(r) + '! I booked your CampusRide ' + r.from + ' → ' + r.to + ' (' + RIDES.formatDT(r.datetime) + ').';
          window.open('https://wa.me/' + waDigits + '?text=' + encodeURIComponent(msg), '_blank', 'noopener');
        }
        if (act === 'share') {
          UI.share({
            title: 'CampusRide',
            text: 'Ride: ' + r.from + ' → ' + r.to + ' · ' + RIDES.formatDT(r.datetime) + ' · ₹' + (r.price || '—') + '/seat · by ' + AUTH.rideName(r)
          }, 'Ride details copied');
        }
        if (act === 'book') {
          RIDES.book(r.id, me, function (res) {
            if (res.ok) {
              UI.toast('Seat booked — contact details below', 'success');
              setTimeout(function () { openDetail(r.id); }, 250);   // re-render with contact info
            } else {
              UI.closeSheet('detailOverlay');
              UI.toast(res.error === 'full' ? 'Just filled up — try another' : 'Could not book — try again', 'error');
            }
          });
        }
        if (act === 'cancelbooking') {
          UI.closeSheet('detailOverlay');
          UI.confirm({
            title: 'Cancel this booking?',
            message: 'Your seat will be released for other students.',
            confirmLabel: 'Cancel booking', cancelLabel: 'Keep it', danger: true
          }).then(function (yes) {
            if (!yes) return;
            RIDES.cancelBooking(r.id, me, function (res) {
              UI.toast(res.ok ? 'Booking cancelled' : (res.error === 'too_late' ? 'Can’t cancel within 15 minutes' : 'Something went wrong'), res.ok ? 'success' : 'error');
            });
          });
        }
        if (act === 'cancelride') {
          UI.closeSheet('detailOverlay');
          cancelMyRide(r.id);
        }
      });
    });

    /* exact pins on a mini map (only when the ride has coordinates) */
    if (window.PLACES) {
      PLACES.routeMap(document.getElementById('detailMapR'),
        { lat: r.fromLat, lng: r.fromLng }, { lat: r.toLat, lng: r.toLng });
    } else {
      document.getElementById('detailMapR').style.display = 'none';
    }

    UI.openSheet('detailOverlay');
  }

  /* ── Search inputs + saved routes ── */
  var debounceT = null;
  ['qFrom', 'qTo'].forEach(function (id) {
    document.getElementById(id).addEventListener('input', function () {
      clearTimeout(debounceT);
      debounceT = setTimeout(applyFilters, 160);
    });
  });

  function swapFromTo() {
    var f = document.getElementById('qFrom'), t = document.getElementById('qTo');
    var tmp = f.value; f.value = t.value; t.value = tmp;
    applyFilters();
  }

  function togglePast() {
    hidePast = !hidePast;
    var btn = document.getElementById('pastToggle');
    btn.classList.toggle('active', !hidePast);
    btn.setAttribute('aria-pressed', String(!hidePast));
    document.getElementById('pastToggleLbl').textContent = hidePast ? 'Hidden' : 'Showing';
    applyFilters();
  }

  function clearFilters() {
    document.getElementById('qFrom').value = '';
    document.getElementById('qTo').value = '';
    vehFilter = 'all';
    document.querySelectorAll('[data-veh]').forEach(function (c) { c.classList.toggle('active', c.dataset.veh === 'all'); });
    applyFilters();
  }

  function getRoutes() {
    try { return JSON.parse(localStorage.getItem(ROUTES_KEY)) || []; } catch (_) { return []; }
  }
  var saveT = null;
  function maybeSaveRoute(f, t) {
    clearTimeout(saveT);
    if (!f || !t) return;
    saveT = setTimeout(function () {
      var routes = getRoutes().filter(function (r) { return !(r.f === f && r.t === t); });
      routes.unshift({ f: f, t: t });
      localStorage.setItem(ROUTES_KEY, JSON.stringify(routes.slice(0, 4)));
      renderRoutes();
    }, 1800);
  }
  function renderRoutes() {
    var routes = getRoutes();
    var wrap = document.getElementById('recentRoutes');
    wrap.classList.toggle('hidden', routes.length === 0);
    wrap.innerHTML = routes.map(function (r, i) {
      return '<button type="button" class="chip chip--route" data-ri="' + i + '">' +
        UI.esc(RIDES.cap(r.f)) + ' → ' + UI.esc(RIDES.cap(r.t)) +
        '<span data-rx="' + i + '" role="button" aria-label="Remove saved route" style="margin-left:0.2rem; opacity:0.65; padding:0 0.15rem;">✕</span></button>';
    }).join('');
  }
  document.getElementById('recentRoutes').addEventListener('click', function (e) {
    var rx = e.target.closest('[data-rx]');
    if (rx) {
      e.stopPropagation();
      var routes = getRoutes();
      routes.splice(+rx.dataset.rx, 1);
      localStorage.setItem(ROUTES_KEY, JSON.stringify(routes));
      renderRoutes();
      return;
    }
    var chip = e.target.closest('[data-ri]');
    if (chip) {
      var r = getRoutes()[+chip.dataset.ri];
      if (!r) return;
      document.getElementById('qFrom').value = r.f;
      document.getElementById('qTo').value = r.t;
      applyFilters();
    }
  });
  renderRoutes();

  /* ── Offer sheet ── */
  function localDT(d) {
    var p = function (n) { return String(n).padStart(2, '0'); };
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + 'T' + p(d.getHours()) + ':' + p(d.getMinutes());
  }
  function openOffer() {
    document.getElementById('offWhen').min = localDT(new Date());
    document.getElementById('offError').style.display = 'none';
    UI.openSheet('offerOverlay');
  }
  var VEH_SEATS = { bike: 1, auto: 2, cab: 3 };

  function swapVeh() {
    var veh = document.getElementById('offVehicle').value;
    document.getElementById('offVehIcon').innerHTML = UI.vehicleIcon(veh);
    var max = VEH_SEATS[veh] || 3;
    var inp = document.getElementById('offSeats');
    inp.max = String(max);
    // Auto-fill whenever vehicle changes (or value exceeds new max)
    if (inp.dataset.userSet !== 'true' || parseInt(inp.value, 10) > max) {
      inp.value = String(max);
    }
  }

  // Track whether user has manually typed a seats value
  document.getElementById('offSeats').addEventListener('input', function () {
    this.dataset.userSet = 'true';
  });
  // Changing vehicle resets the manual-override flag → auto-fill kicks in again
  document.getElementById('offVehicle').addEventListener('change', function () {
    document.getElementById('offSeats').dataset.userSet = 'false';
  });

  swapVeh();

  function postRide(e) {
    e.preventDefault();
    var errEl = document.getElementById('offError');
    errEl.style.display = 'none';

    var from  = document.getElementById('offFrom').value.trim();
    var to    = document.getElementById('offTo').value.trim();
    var when  = document.getElementById('offWhen').value;
    var seats = parseInt(document.getElementById('offSeats').value, 10);
    var veh   = document.getElementById('offVehicle').value;
    var price = parseInt(document.getElementById('offPrice').value, 10);

    function fail(msg) { errEl.textContent = msg; errEl.style.display = 'block'; }
    if (!from || !to)                     return fail('Add both pickup and drop locations.');
    if (!when)                            return fail('Pick a date and time.');
    if (new Date(when) - Date.now() < 0)  return fail('That time is in the past.');
    var maxSeats = VEH_SEATS[veh] || 3;
    if (!seats || seats < 1 || seats > maxSeats) return fail('Seats must be between 1 and ' + maxSeats + ' for a ' + veh + '.');
    if (!price || price < 1)              return fail('Add a price per seat.');

    var fromEl = document.getElementById('offFrom'), toEl = document.getElementById('offTo');
    RIDES.add({
      offeredBy: me, offererName: AUTH.myDisplayName(), from: from, to: to, datetime: when,
      seats: seats, vehicle: veh, price: price,
      phone: myPhone || '',
      fromLat: fromEl.dataset.lat || '', fromLng: fromEl.dataset.lng || '',
      toLat: toEl.dataset.lat || '', toLng: toEl.dataset.lng || ''
    });

    e.target.reset();
    document.getElementById('offSeats').dataset.userSet = 'false';
    swapVeh();
    UI.closeSheet('offerOverlay');
    UI.toast('Ride posted — it’s live!', 'success');
  }

  /* location autocomplete + map picker (places.js is deferred) */
  window.addEventListener('DOMContentLoaded', function () {
    if (window.PLACES) {
      PLACES.attach(document.getElementById('qFrom'), { onPick: applyFilters });
      PLACES.attach(document.getElementById('qTo'), { onPick: applyFilters });
      PLACES.attach(document.getElementById('offFrom'), { map: true });
      PLACES.attach(document.getElementById('offTo'), { map: true });
    }
  });
</script>

</body>
</html>
