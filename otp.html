<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a12">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<title>CampusRide – Verify email</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script>
  (function () {
    try {
      var t = localStorage.getItem('cr-theme');
      var light = t === 'light' || (!t && matchMedia('(prefers-color-scheme: light)').matches);
      if (light) document.documentElement.setAttribute('data-theme', 'light');
    } catch (_) {}
  })();
</script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="auth.js"></script>
<script src="ui.js"></script>
</head>
<body>

<div class="auth" style="grid-template-rows:auto 1fr; grid-template-columns:none;">

  <header class="auth__brandpane" style="padding-bottom:0.5rem; border-right:0;">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:1rem; max-width:400px; margin:0 auto; width:100%;">
      <a class="brand" href="login.html" aria-label="CampusRide">
        <span class="brand__mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6.4" cy="17.6" r="2.7"/><line x1="8.7" y1="15.3" x2="15.3" y2="8.7"/><circle cx="17.6" cy="6.4" r="2.7"/></svg>
        </span>
        CampusRide
      </a>
      <button type="button" class="theme-btn" data-theme-toggle aria-label="Toggle theme" aria-pressed="false">
        <span class="i-moon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        <span class="i-sun"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></span>
      </button>
    </div>
  </header>

  <main class="auth__formpane" style="align-items:flex-start;">
    <div class="auth-card reveal">
      <div class="card" style="text-align:center;">

        <div class="steps" aria-hidden="true"><i class="done"></i><i class="done"></i><i></i></div>

        <div style="width:64px; height:64px; border-radius:20px; background:var(--acc-soft); display:grid; place-items:center; margin:0.5rem auto 1rem;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent-text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </div>

        <h2 class="auth-title">Check your inbox</h2>
        <p class="auth-sub" id="vSub" style="margin-bottom:1rem;">We sent a verification link to your college email.</p>

        <div class="msg-error" id="vError" role="alert" style="text-align:left;"></div>

        <button type="button" class="btn btn--primary btn--block" id="vCheck" onclick="checkNow()" style="margin-top:0.5rem;">
          I've clicked the link — continue
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg>
        </button>

        <p class="auth-foot" style="margin-top:1rem;">
          Didn't get it? Check spam, or <button type="button" class="link" id="resendBtn" onclick="resend()">resend the link</button>
        </p>
        <p class="auth-foot" style="margin-top:0.4rem;">
          <button type="button" class="link" onclick="useDifferent()">← Use a different account</button>
        </p>

      </div>
    </div>
  </main>
</div>

<script>
  /* must be signed in; verified users go straight to the app */
  AUTH.ready(function (u) {
    if (!u) { window.location.href = 'login.html'; return; }
    if (u.emailVerified) { window.location.href = 'index.html'; return; }
    document.getElementById('vSub').innerHTML =
      'We sent a verification link to<br><strong>' + UI.esc(u.email) + '</strong>';
    startPolling();
  });

  function showError(msg) {
    var el = document.getElementById('vError');
    el.textContent = msg;
    el.style.display = 'block';
  }

  /* auto-detect verification every 5s */
  var pollT = null;
  function startPolling() {
    pollT = setInterval(function () {
      AUTH.checkVerified(function (ok) {
        if (ok) {
          clearInterval(pollT);
          UI.toast('Email verified — welcome aboard!', 'success');
          setTimeout(function () { window.location.href = 'index.html'; }, 700);
        }
      });
    }, 5000);
  }

  function checkNow() {
    var btn = document.getElementById('vCheck');
    btn.disabled = true;
    AUTH.checkVerified(function (ok) {
      btn.disabled = false;
      if (ok) {
        window.location.href = 'index.html';
      } else {
        showError('Not verified yet — open the link in the email we sent, then try again.');
      }
    });
  }

  var cooldown = 0, cdT = null;
  function resend() {
    if (cooldown > 0) return;
    document.getElementById('vError').style.display = 'none';
    AUTH.resendVerification(function (r) {
      if (r.ok) UI.toast('Verification link sent again', 'success');
      else showError(r.error || 'Could not resend — try again in a minute.');
    });
    cooldown = 30;
    var btn = document.getElementById('resendBtn');
    btn.disabled = true;
    btn.textContent = 'resend in 30s';
    cdT = setInterval(function () {
      cooldown--;
      btn.textContent = cooldown > 0 ? 'resend in ' + cooldown + 's' : 'resend the link';
      if (cooldown <= 0) { clearInterval(cdT); btn.disabled = false; }
    }, 1000);
  }

  function useDifferent() {
    AUTH.signOut(function () { window.location.href = 'login.html'; });
  }

  UI.theme.apply();
</script>

</body>
</html>
