<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<title>Campus Ride – Verify OTP</title>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </div>
      <div class="auth-brand">Campus Ride</div>
    </div>

    <h2 class="auth-title">Check your email</h2>
    <p class="auth-sub">We sent a 4-digit code to your college email. Enter it below.</p>

    <form onsubmit="handleVerify(event)">
      <div class="otp-inputs">
        <input class="otp-cell" type="tel" inputmode="numeric" maxlength="1" aria-label="Digit 1">
        <input class="otp-cell" type="tel" inputmode="numeric" maxlength="1" aria-label="Digit 2">
        <input class="otp-cell" type="tel" inputmode="numeric" maxlength="1" aria-label="Digit 3">
        <input class="otp-cell" type="tel" inputmode="numeric" maxlength="1" aria-label="Digit 4">
      </div>

      <p class="otp-resend" style="margin-bottom:1.25rem;">
        Didn't receive it?
        <button type="button" onclick="resendOtp(this)">Resend code</button>
      </p>

      <button type="submit" class="btn-primary">
        Verify &amp; Sign In
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg>
      </button>
    </form>

    <p class="auth-footer" style="margin-top:1rem;">
      <a href="login.html">← Use a different number</a>
    </p>

  </div>
</div>

<script>
/* OTP auto-advance */
const cells = document.querySelectorAll('.otp-cell');

cells.forEach(function(cell, i) {
  cell.addEventListener('input', function() {
    var val = cell.value.replace(/\D/g, '');
    cell.value = val.slice(0, 1);
    if (val && i < cells.length - 1) {
      cells[i + 1].focus();
    }
  });

  cell.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !cell.value && i > 0) {
      cells[i - 1].focus();
    }
  });

  cell.addEventListener('paste', function(e) {
    e.preventDefault();
    var pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
    cells.forEach(function(c, j) {
      c.value = pasted[j] || '';
    });
    var next = Math.min(pasted.length, cells.length - 1);
    cells[next].focus();
  });
});

cells[0].focus();

function handleVerify(e) {
  e.preventDefault();
  var code = Array.from(cells).map(function(c) { return c.value; }).join('');
  if (code.length < 4) {
    alert('Please enter the complete 4-digit code.');
    return;
  }
  window.location.href = 'home.html';
}

function resendOtp(btn) {
  btn.textContent = 'Sent!';
  btn.disabled = true;
  setTimeout(function() {
    btn.textContent = 'Resend code';
    btn.disabled = false;
  }, 30000);
}
</script>

</body>
</html>
